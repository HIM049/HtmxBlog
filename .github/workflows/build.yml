name: Build for Linux

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies and Build Assets
        run: |
          pnpm install
          pnpm exec tailwindcss -i ./templates/user/style.css -o ./assets/style.css --minify
          pnpm exec tailwindcss -i ./templates/admin/style.css -o ./assets/admin_style.css --minify
          pnpm exec shx cp node_modules/htmx.org/dist/htmx.min.js assets/htmx.js

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o HtmxBlog main.go

      - name: Package artifacts
        run: |
          mkdir -p release
          cp HtmxBlog release/
          cp .env.example release/
          cp -r assets release/
          cp -r templates release/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HtmxBlog
          path: release/
          retention-days: 30

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Delete old images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: htmxblog
          keep-n-tagged: 1
          exclude-tags: latest
          delete-untagged: true

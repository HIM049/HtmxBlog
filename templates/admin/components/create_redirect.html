{{ define "create_redirect" }}
<div class="mb-8 bg-white dark:bg-zinc-800 shadow-md rounded px-8 pt-6 pb-8">
    <h2 class="text-xl font-bold mb-4 border-b dark:border-zinc-700 pb-2">{{ .I18n.Redirects.CreateTitle }}</h2>
    <form hx-post="/api/admin/redirect" hx-swap="none"
        hx-on::after-request="if(event.detail.successful) this.reset()"
        class="flex gap-4 items-end">
        <div class="flex-1">
            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">{{ .I18n.Redirects.SourcePathLabel }}</label>
            <input type="text" name="source_path" required placeholder="{{ .I18n.Redirects.SourcePathPlaceholder }}"
                class="shadow appearance-none border dark:border-zinc-600 rounded w-full py-2 px-3 text-gray-700 dark:text-gray-200 leading-tight focus:outline-none focus:shadow-outline bg-white dark:bg-zinc-700" />
        </div>
        <div class="flex-1">
            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">{{ .I18n.Redirects.TargetPathLabel }}</label>
            <input type="text" name="target_path" required placeholder="{{ .I18n.Redirects.TargetPathPlaceholder }}"
                class="shadow appearance-none border dark:border-zinc-600 rounded w-full py-2 px-3 text-gray-700 dark:text-gray-200 leading-tight focus:outline-none focus:shadow-outline bg-white dark:bg-zinc-700" />
        </div>
        <div class="w-24">
            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">{{ .I18n.Redirects.CodeLabel }}</label>
            <select name="status_code"
                class="shadow border dark:border-zinc-600 rounded w-full py-2 px-3 text-gray-700 dark:text-gray-200 leading-tight focus:outline-none focus:shadow-outline bg-white dark:bg-zinc-700">
                <option value="301">301</option>
                <option value="302">302</option>
            </select>
        </div>
        <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 h-[42px]">
            {{ .I18n.Redirects.AddButton }}
        </button>
    </form>
</div>
{{ end }}

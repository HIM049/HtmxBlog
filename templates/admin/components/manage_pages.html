{{ define "manage_pages" }}

<div id="pages-manager" hx-get="/admin/manage_pages" hx-select="#pages-manager" hx-target="#pages-manager" hx-trigger="newPage from:body">
    <div class="bg-white dark:bg-zinc-800 shadow-md rounded px-8 pt-6 pb-8 mb-8">
        <h2 class="text-xl font-bold mb-4 border-b dark:border-zinc-700 pb-2">{{ .I18n.Pages.SectionTitle }}</h2>
        <ul class="space-y-2">
            {{ range .SortedPages }}
            <li hx-disinherit="hx-select" class="flex justify-between items-center p-3 border border-gray-200 dark:border-zinc-700 hover:bg-gray-50 dark:hover:bg-zinc-700/50 rounded transition">
                <div class="flex items-center space-x-4">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" 
                               {{ if gt .Sort 0 }}checked{{ end }}
                               hx-post="/api/admin/page/toggle?page={{ .Name }}&visible={{ if gt .Sort 0 }}false{{ else }}true{{ end }}"
                               hx-swap="none">
                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                    </label>
                    
                    <div>
                        <span class="font-semibold dark:text-gray-100 {{ if eq .Sort 0 }}text-gray-400 dark:text-gray-500 line-through{{ end }}">{{ .Name }}</span>
                        <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">({{ .Route }})</span>
                    </div>
                </div>
                
                <div class="flex items-center space-x-2">
                    {{ if gt .Sort 0 }}
                    <button hx-post="/api/admin/page/moveup?page={{ .Name }}" hx-swap="none"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 px-3 py-1 bg-gray-100 dark:bg-zinc-700 hover:bg-gray-200 dark:hover:bg-zinc-600 rounded transition font-bold shadow-sm border border-gray-200 dark:border-zinc-600">
                        ↑
                    </button>
                    <button hx-post="/api/admin/page/movedown?page={{ .Name }}" hx-swap="none"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 px-3 py-1 bg-gray-100 dark:bg-zinc-700 hover:bg-gray-200 dark:hover:bg-zinc-600 rounded transition font-bold shadow-sm border border-gray-200 dark:border-zinc-600">
                        ↓
                    </button>
                    {{ end }}
                    
                    <button hx-delete="/api/admin/page/{{ .Name }}" hx-confirm="{{ $.I18n.Pages.ConfirmDelete }}"
                        hx-target="closest li" hx-swap="outerHTML"
                        class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-medium text-sm border border-red-200 dark:border-red-900/50 hover:border-red-400 px-3 py-1 rounded transition ml-4">
                        {{ $.I18n.Common.Delete }}
                    </button>
                </div>
            </li>
            {{ end }}
            {{ range .HiddenPages }}
            <li hx-disinherit="hx-select" class="flex justify-between items-center p-3 border border-gray-200 dark:border-zinc-700 hover:bg-gray-50 dark:hover:bg-zinc-700/50 rounded transition">
                <div class="flex items-center space-x-4">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" 
                               {{ if gt .Sort 0 }}checked{{ end }}
                               hx-post="/api/admin/page/toggle?page={{ .Name }}&visible={{ if gt .Sort 0 }}false{{ else }}true{{ end }}"
                               hx-swap="none">
                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                    </label>
                    
                    <div>
                        <span class="font-semibold dark:text-gray-100 {{ if eq .Sort 0 }}text-gray-400 dark:text-gray-500 line-through{{ end }}">{{ .Name }}</span>
                        <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">({{ .Route }})</span>
                    </div>
                </div>
                
                <div class="flex items-center space-x-2">
                    {{ if gt .Sort 0 }}
                    <button hx-post="/api/admin/page/moveup?page={{ .Name }}" hx-swap="none"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 px-3 py-1 bg-gray-100 dark:bg-zinc-700 hover:bg-gray-200 dark:hover:bg-zinc-600 rounded transition font-bold shadow-sm border border-gray-200 dark:border-zinc-600">
                        ↑
                    </button>
                    <button hx-post="/api/admin/page/movedown?page={{ .Name }}" hx-swap="none"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 px-3 py-1 bg-gray-100 dark:bg-zinc-700 hover:bg-gray-200 dark:hover:bg-zinc-600 rounded transition font-bold shadow-sm border border-gray-200 dark:border-zinc-600">
                        ↓
                    </button>
                    {{ end }}
                    
                    <button hx-delete="/api/admin/page/{{ .Name }}" hx-confirm="{{ $.I18n.Pages.ConfirmDelete }}"
                        hx-target="closest li" hx-swap="outerHTML"
                        class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-medium text-sm border border-red-200 dark:border-red-900/50 hover:border-red-400 px-3 py-1 rounded transition ml-4">
                        {{ $.I18n.Common.Delete }}
                    </button>
                </div>
            </li>
            {{ end }}
        </ul>
    </div>
</div>

{{ end }}

{{ define "manage_settings" }}
<div class="bg-white dark:bg-zinc-800 shadow-md rounded px-8 pt-6 pb-8 mb-4">
    <h2 class="text-xl font-bold mb-4 border-b dark:border-zinc-700 pb-2">Existing Settings</h2>
    <ul id="settings-list" class="space-y-4">
        {{ range .Settings }}
        {{ template "setting_item" . }}
        {{ else }}
        <li class="text-gray-500 dark:text-gray-400 italic text-center py-4">No settings found.</li>
        {{ end }}
    </ul>
</div>
{{ end }}

{{ define "setting_item" }}
<li id="setting-{{ .ID }}" class="flex justify-between items-center p-3 hover:bg-gray-50 dark:hover:bg-zinc-700/50 rounded border border-gray-100 dark:border-zinc-700 transition-colors">
    <div class="flex-1 grid grid-cols-2 gap-4">
        <div>
            <span class="text-sm text-gray-400 dark:text-gray-500 block mb-1">Key</span>
            <input type="text" name="key" value="{{ .Key }}" hx-patch="/api/admin/setting/{{ .ID }}" hx-trigger="change"
                hx-swap="none"
                class="font-mono text-sm bg-gray-50 dark:bg-zinc-900/50 border border-gray-200 dark:border-zinc-600 dark:text-gray-300 rounded px-2 py-1 w-full focus:bg-white dark:focus:bg-zinc-800 transition-all">
        </div>
        <div>
            <span class="text-sm text-gray-400 dark:text-gray-500 block mb-1">Value</span>
            <input type="text" name="value" value="{{ .Value }}" hx-patch="/api/admin/setting/{{ .ID }}"
                hx-trigger="change" hx-swap="none"
                class="text-sm bg-transparent border-transparent hover:border-gray-300 dark:hover:border-zinc-600 dark:text-gray-200 focus:border-blue-300 dark:focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 rounded px-2 py-1 w-full transition-all">
        </div>
    </div>
    <div class="ml-4">
        <button hx-delete="/api/admin/setting/{{ .ID }}" hx-confirm="Are you sure you want to delete this setting?"
            hx-target="#setting-{{ .ID }}" hx-swap="outerHTML"
            class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-medium text-sm border border-red-200 dark:border-red-900/50 hover:border-red-400 px-3 py-1 rounded transition h-10">
            Delete
        </button>
    </div>
</li>
{{ end }}

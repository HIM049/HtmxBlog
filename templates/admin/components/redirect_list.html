{{ define "redirect_list" }}
<div class="bg-white dark:bg-zinc-800 shadow-md rounded px-8 pt-6 pb-8 mb-4">
    <h2 class="text-xl font-bold mb-4 border-b dark:border-zinc-700 pb-2">{{ .I18n.Redirects.ExistingTitle }}</h2>
    <ul id="redirects-list" class="space-y-4">
        {{ range .Redirects }}
        <li id="redirect-{{ .ID }}"
            class="flex justify-between items-center p-3 hover:bg-gray-50 dark:hover:bg-zinc-700/50 rounded border border-gray-100 dark:border-zinc-700 transition-colors">
            <div class="flex-1 grid grid-cols-12 gap-4">
                <div class="col-span-5">
                    <span class="text-sm text-gray-400 dark:text-gray-500 block mb-1">{{ $.I18n.Redirects.SourceCol }}</span>
                    <input type="text" name="source_path" value="{{ .SourcePath }}"
                        hx-patch="/api/admin/redirect/{{ .ID }}" hx-trigger="change"
                        hx-swap="none"
                        class="font-mono text-sm bg-gray-50 dark:bg-zinc-900/50 border border-gray-200 dark:border-zinc-600 dark:text-gray-300 rounded px-2 py-1 w-full focus:bg-white dark:focus:bg-zinc-800 transition-all" />
                </div>
                <div class="col-span-5">
                    <span class="text-sm text-gray-400 dark:text-gray-500 block mb-1">{{ $.I18n.Redirects.TargetCol }}</span>
                    <input type="text" name="target_path" value="{{ .TargetPath }}"
                        hx-patch="/api/admin/redirect/{{ .ID }}" hx-trigger="change"
                        hx-swap="none"
                        class="font-mono text-sm bg-gray-50 dark:bg-zinc-900/50 border border-gray-200 dark:border-zinc-600 dark:text-gray-300 rounded px-2 py-1 w-full focus:bg-white dark:focus:bg-zinc-800 transition-all" />
                </div>
                <div class="col-span-1">
                    <span class="text-sm text-gray-400 dark:text-gray-500 block mb-1">{{ $.I18n.Redirects.CodeLabel }}</span>
                    <select name="status_code" hx-patch="/api/admin/redirect/{{ .ID }}" hx-trigger="change"
                        hx-swap="none"
                        class="text-sm bg-gray-50 dark:bg-zinc-900/50 border border-gray-200 dark:border-zinc-600 dark:text-gray-300 rounded px-1 py-1 w-full focus:bg-white dark:focus:bg-zinc-800 transition-all">
                        <option value="301" {{ if eq .StatusCode 301 }}selected{{ end }}>301</option>
                        <option value="302" {{ if eq .StatusCode 302 }}selected{{ end }}>302</option>
                    </select>
                </div>
            </div>
            <div class="ml-4">
                <button hx-delete="/api/admin/redirect/{{ .ID }}" hx-confirm="{{ $.I18n.Redirects.ConfirmDelete }}"
                    hx-target="#redirect-{{ .ID }}" hx-swap="outerHTML"
                    class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-medium text-sm border border-red-200 dark:border-red-900/50 hover:border-red-400 px-3 py-1 rounded transition h-10">
                    {{ $.I18n.Common.Delete }}
                </button>
            </div>
        </li>
        {{ else }}
        <li class="text-gray-500 dark:text-gray-400 italic text-center py-4">{{ .I18n.Redirects.NoRedirects }}</li>
        {{ end }}
    </ul>
</div>
{{ end }}

{{ define "post_manage"}}
{{ template "header"}}

<body class="bg-gray-100 dark:bg-zinc-900 dark:text-gray-100">
    <div class="max-w-[1000px] mx-auto">
        <div class="flex justify-between items-center p-6">
            <div class="flex items-center gap-4">
                <a href="/admin" class="text-gray-500 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h1 class="text-3xl font-bold">Manage Posts</h1>
            </div>

            <button hx-post="/api/admin/post/create"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow">
                Create New Post
            </button>
        </div>


        {{ template "manage_posts" . }}
    </div>
</body>

</html>
{{ end }}

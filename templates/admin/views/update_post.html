{{ define "update_post" }}
{{ template "header" . }}

<body class="bg-gray-100 dark:bg-zinc-900 dark:text-gray-100 flex justify-center mt-8 p-4">
    <div class="w-full max-w-7xl">
        <div class="mb-4">
            <a href="/admin/posts" onclick="return confirm('Leave the editor? Unsaved draft changes may be lost.')" class="inline-flex items-center text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Posts
            </a>
        </div>
        {{ template "edit_post" . }}
    </div>
    <script>
        let allowEditorLeave = false;

        window.addEventListener("beforeunload", function (event) {
            if (allowEditorLeave) {
                return;
            }
            event.preventDefault();
            event.returnValue = "";
        });

        document.body.addEventListener("htmx:beforeRequest", function (event) {
            const elt = event.detail && event.detail.elt;
            if (elt && (elt.id === "post-form" || elt.matches('[hx-post$="/publish"]'))) {
                allowEditorLeave = true;
                setTimeout(function () {
                    allowEditorLeave = false;
                }, 1000);
            }
        });
    </script>
</body>

{{ end }}

{{ define "attach_uploader"}}
<div class="bg-white shadow-md rounded p-4">
    <h3 class="font-bold text-gray-700 border-b pb-2 mb-4">Attachments</h3>
    <form hx-post="/api/admin/post/{{ .Post.ID }}/attach" hx-encoding="multipart/form-data" hx-target="#attach-list"
        hx-swap="afterbegin" class="p-4 bg-gray-50 rounded border border-gray-200 mb-6">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="file">
                Select File
            </label>
            <input
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                id="file" type="file" name="file" required>
        </div>
        <div class="flex items-center justify-between">
            <button
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition-colors"
                type="submit" onclick="setTimeout(() => document.getElementById('file').value = '', 100)">
                Upload
            </button>
        </div>
    </form>
    <div id="attach-list" class="mt-4 mb-8">
        {{ range .Post.Attachs }}
        {{ template "attach_item" . }}
        {{ end }}
    </div>
</div>
{{ end }}

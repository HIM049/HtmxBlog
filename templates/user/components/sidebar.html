{{ define "sidebar"}}

<div class="hidden md:block w-[280px] shrink-0">
    <div class="sticky top-8 ">
        <div class="bg-white rounded-2xl shadow-standard p-6 mb-6">
            <h3 class="text-lg font-bold mb-4 text-gray-800 border-b border-gray-100 pb-2">Categories</h3>
            <div class="flex flex-col space-y-1">
                {{ range .Categories }}
                <a href="/?category={{ .ID }}"
                    class="flex items-center justify-between p-2.5 rounded-xl hover:bg-gray-100 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full shrink-0 shadow-sm" style="background-color: {{ .Color }}">
                        </div>
                        <span class="text-gray-600 group-hover:text-gray-900 font-medium text-sm">{{ .Name }}</span>
                    </div>
                    <span class="text-xs text-gray-400 bg-gray-100 group-hover:bg-white px-2 py-0.5 rounded-full">{{
                        .Count }}</span>
                </a>
                {{ end }}
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-standard p-6 mb-6">
            <h3 class="text-lg font-bold mb-4 text-gray-800 border-b border-gray-100 pb-2">Tags</h3>
            <div class="flex flex-wrap gap-2">
                {{ range .Tags }}
                <a href="/?tag={{ . }}"
                    class="px-3 py-1.5 bg-gray-50 hover:bg-gray-100 text-gray-600 hover:text-gray-900 rounded-full text-sm transition-all border border-gray-100 hover:border-gray-300">
                    #{{ . }}
                </a>
                {{ end }}
            </div>
        </div>

        <button hx-on:click="window.scrollTo({top: 0, behavior: 'smooth'})"
            class="w-full hover:bg-white rounded-full hover:shadow-standard-sm p-3 flex items-center justify-center gap-2 text-gray-600 hover:text-gray-900 transition-all duration-300 group">
            <img src="/assets/arrow_up_24dp.svg" alt="Back to Top" class="color-gray-900">
            <span class=" font-bold text-sm pr-2">Back to Top</span>
        </button>
    </div>

</div>

{{ end }}

{{ define "sidebar"}}

<div class="hidden md:block w-[280px] shrink-0">
    <div class="sticky top-8 ">
        <div class="bg-white dark:bg-zinc-700 rounded-2xl shadow-standard p-6 mb-6">
            <h3
                class="text-lg font-bold mb-4 text-zinc-800 dark:text-white border-b border-gray-100 dark:border-gray-500 pb-2">
                Categories</h3>
            <div class="flex flex-col space-y-1">
                {{ range .Categories }}
                <a href="/?category={{ .ID }}"
                    class="flex items-center justify-between p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full shrink-0 shadow-sm" style="background-color: {{ .Color }}">
                        </div>
                        <span class="text-zinc-600 dark:text-zinc-400 group-hover:text-zinc-900 dark:group-hover:text-zinc-300 font-medium text-sm">{{ .Name }}</span>
                    </div>
                    <span class="text-xs text-zinc-400 bg-gray-100 dark:bg-zinc-800 group-hover:bg-white dark:group-hover:bg-zinc-700 px-2 py-0.5 rounded-full">
                        {{ .Count }}
                    </span>
                </a>
                {{ end }}
            </div>
        </div>

        <div class="bg-white dark:bg-zinc-700 rounded-2xl shadow-standard p-6 mb-6">
            <h3
                class="text-lg font-bold mb-4 text-zinc-800 dark:text-white border-b border-gray-100 dark:border-gray-500 pb-2">
                Tags</h3>
            <div class="flex flex-wrap gap-2">
                {{ range .Tags }}
                <a href="/?tag={{ .Name }}"
                    class="px-3 py-1.5 bg-gray-50 dark:bg-zinc-600 hover:bg-gray-100 dark:hover:bg-zinc-500 text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100 rounded-full text-sm transition-all border border-gray-100 dark:border-gray-500 hover:border-gray-300">
                    #{{ .Name }}
                </a>
                {{ end }}
            </div>
        </div>

        <button hx-on:click="window.scrollTo({top: 0, behavior: 'smooth'})"
            class="w-full hover:bg-white dark:hover:bg-zinc-700 rounded-full hover:shadow-standard-sm p-3 flex items-center justify-center gap-2 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-300 group">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-current">
                <path
                    d="M480-528 324-372q-11 11-28 11t-28-11q-11-11-11-28t11-28l184-184q12-12 28-12t28 12l184 184q11 11 11 28t-11 28q-11 11-28 11t-28-11L480-528Z" />
            </svg>
            <span class=" font-bold text-sm pr-2">Back to Top</span>
        </button>
    </div>

</div>

{{ end }}
